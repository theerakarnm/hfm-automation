services:
  hfm-report:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hfm-report
    restart: unless-stopped
    ports:
      - "3000:3000"       # change left port if 3000 is taken: e.g. "8080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    # Uncomment to put behind Nginx on same Docker network:
    # networks:
    #   - nginx-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

