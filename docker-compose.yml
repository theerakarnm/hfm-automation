services:
  bot:
    build: .
    container_name: hfm-line-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      - PORT=3000
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/internal/health?key=$$INTERNAL_API_KEY || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
